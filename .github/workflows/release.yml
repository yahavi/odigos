name: Release Odigos

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag"
        required: true

  repository_dispatch:
    types: [release_cli]

permissions:
  contents: write
  packages: write
  id-token: write

env:
  DOCKERHUB_ORG: "keyval"

jobs:
  package-helm:
    runs-on: ubuntu-latest
    steps:
      - name: Determine Tag Value
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "TAG=${{ github.event.inputs.tag }}" >> $GITHUB_ENV
          elif [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            echo "TAG=${{ github.event.client_payload.tag }}" >> $GITHUB_ENV
          else
            echo "Unknown event type"
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ env.TAG }} # checkout the tag we are releasing (main might have been updated since the tag was created)

      - name: Install Helm
        uses: azure/setup-helm@v4.2.0
        with:
          version: v3.15.2

      - name: Package Helm charts
        run: bash ./scripts/package-charts.sh

      - name: Upload packaged chart artifact
        uses: actions/upload-artifact@v4
        with:
          name: odigos-chart
          path: helm/odigos-*.tgz

  build-cli:
    needs: [package-helm]
    runs-on: ubuntu-24.04
    steps:
      - name: Determine Tag Value
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "TAG=${{ github.event.inputs.tag }}" >> $GITHUB_ENV
          elif [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            echo "TAG=${{ github.event.client_payload.tag }}" >> $GITHUB_ENV
          else
            echo "Unknown event type"
            exit 1
          fi

      - name: Check Release Type
        run: |
          TAG="${{ env.TAG }}"

          # Check if it's a pre-release (has additional suffix after vX.Y.Z)
          if [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+- ]]; then
            echo "IS_PRERELEASE=true" >> $GITHUB_ENV
            echo "This is a pre-release: $TAG"
          else
            echo "IS_PRERELEASE=false" >> $GITHUB_ENV
            echo "This is a stable release: $TAG"
          fi

          # Release branch for tag: v1.17.6 -> releases/v1.17.0
          VERSION="${TAG#v}"
          MAJOR_MINOR=$(echo "$VERSION" | cut -d. -f1,2)
          echo "RELEASE_BRANCH=releases/v${MAJOR_MINOR}.0" >> $GITHUB_ENV

      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ env.TAG }} # checkout the tag we are releasing (main might have been updated since the tag was created)

      # Ensure the chart is here to be embedded in the CLI
      - name: Download packaged chart artifact
        uses: actions/download-artifact@v4
        with:
          name: odigos-chart
          path: cli/pkg/helm/embedded

      - name: Set env
        id: vars
        run: |
          SHORT_COMMIT=$(git rev-parse --short HEAD)
          echo "short_commit=${SHORT_COMMIT}" >> $GITHUB_ENV
          echo "date=$(date -u +"%Y-%m-%dT%H:%M:%SZ")" >> $GITHUB_OUTPUT

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.2"

      - uses: actions/setup-node@v5
        with:
          node-version: 18

      - name: Generate and update release notes
        uses: odigos-io/ci-core/generate-release-notes@main
        continue-on-error: true
        with:
          tag: ${{ env.TAG }}
          release-branch: ${{ env.RELEASE_BRANCH }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup JFrog Fly
        uses: jfrog/fly-action@v1

      - uses: ko-build/setup-ko@v0.9

      - name: publish cli image to docker registries
        working-directory: ./cli
        env:
          KO_DOCKER_REPO: odigosdemo.jfrog.io/docker/odigos-cli
          KO_CONFIG_PATH: ./.ko.yaml
          VERSION: ${{ env.TAG }}
          SHORT_COMMIT: ${{ steps.vars.outputs.short_commit }}
          DATE: ${{ steps.vars.outputs.date }}
        run: |
          ko build --bare --tags latest --tags ${{ env.TAG }} --platform=linux/amd64,linux/arm64

  publish-helm:
    needs: [build-cli]
    runs-on: ubuntu-latest
    steps:
      - name: Determine Tag Value
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "TAG=${{ github.event.inputs.tag }}" >> $GITHUB_ENV
          elif [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            echo "TAG=${{ github.event.client_payload.tag }}" >> $GITHUB_ENV
          else
            echo "Unknown event type"
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ env.TAG }} # checkout the tag we are releasing (main might have been updated since the tag was created)

      - name: Install Helm
        uses: azure/setup-helm@v4.2.0
        with:
          version: v3.15.2

      - name: Download packaged chart artifact
        uses: actions/download-artifact@v4
        with:
          name: odigos-chart
          path: helm/

      - name: Setup JFrog Fly
        uses: jfrog/fly-action@v1

      - name: Publish Helm charts
        run: bash ./scripts/publish-charts.sh
